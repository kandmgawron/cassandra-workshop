AWSTemplateFormatVersion: '2010-09-09'
Description: >
  3-node Cassandra sandbox — one EC2 host per Cassandra node (truly distributed).
  Each host runs a single Cassandra 5.0 container. Node 1 is the seed;
  nodes 2 and 3 join sequentially via gossip.

  Cost (on-demand, ARM):
    t4g.small  (2 GB RAM): 3 × $0.017/hr ≈ $0.05/hr ≈ $37/mo if left running
    t4g.medium (4 GB RAM): 3 × $0.034/hr ≈ $0.10/hr ≈ $74/mo if left running
  Stop all three instances when not in use — storage cost is ~$0.24/mo per node.

  Startup time: ~8-10 min from stack CREATE_COMPLETE to all-nodes-UN.

Parameters:
  AllowedCidr:
    Type: String
    Description: >
      Your public IP in CIDR form, e.g. 203.0.113.5/32.
      Restricts SSH (22) and CQL (9042) on all three nodes to this address.
      Find your IP at https://checkip.amazonaws.com/
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access to all three nodes.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues: [t4g.small, t4g.medium, t4g.large]
    Description: >
      t4g.small (2 GB) is fine for a sandbox with MAX_HEAP_SIZE=512M.
      Use t4g.medium if you plan to ingest significant data.

  LatestAl2023Ami:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64'
    Description: >
      Resolves automatically to the latest Amazon Linux 2023 ARM64 AMI in
      this region. Leave as-is unless you need a specific OS image.

Resources:

  # ---------------------------------------------------------------------------
  # Network: a minimal public VPC so all three nodes can reach each other and
  # the internet (for Docker pulls) without needing pre-existing infrastructure.
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - { Key: Name, Value: cassandra-sandbox-vpc }

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: cassandra-sandbox-subnet }

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ---------------------------------------------------------------------------
  # Security group
  # External: SSH + CQL (9042) locked to your IP on all three nodes.
  # Internal: ports 7000/7001 (gossip + streaming) and 9042 (CQL coordination)
  #           open between nodes so the cluster can self-organise.
  # ---------------------------------------------------------------------------
  CassandraSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cassandra sandbox — external SSH/CQL + internal gossip
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
          Description: SSH from your IP
        - IpProtocol: tcp
          FromPort: 9042
          ToPort: 9042
          CidrIp: !Ref AllowedCidr
          Description: CQL from your IP (connect to any node)

  # Self-referencing rules added separately to avoid circular dependency.
  SGIngressGossip:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CassandraSG
      IpProtocol: tcp
      FromPort: 7000
      ToPort: 7001
      SourceSecurityGroupId: !Ref CassandraSG
      Description: Inter-node gossip and streaming

  SGIngressCQLInternal:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CassandraSG
      IpProtocol: tcp
      FromPort: 9042
      ToPort: 9042
      SourceSecurityGroupId: !Ref CassandraSG
      Description: CQL between nodes (coordinator → replica requests)

  # ---------------------------------------------------------------------------
  # Node 1 — seed node.
  # Starts Cassandra immediately; waits for all 3 nodes UN before loading schema.
  # ---------------------------------------------------------------------------
  CassandraNode1:
    Type: AWS::EC2::Instance
    DependsOn: DefaultRoute
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: !Ref LatestAl2023Ami
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref CassandraSG
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - { Key: Name, Value: cassandra-node-1 }
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y docker
          systemctl enable --now docker

          # Use this instance's private IP for all Cassandra listen/broadcast
          # addresses so nodes can reach each other across the VPC.
          PRIVATE_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)

          docker run -d \
            --name cassandra \
            --restart unless-stopped \
            -p 9042:9042 -p 7000:7000 -p 7001:7001 \
            -e CASSANDRA_CLUSTER_NAME=SandboxCluster \
            -e CASSANDRA_SEEDS="$PRIVATE_IP" \
            -e CASSANDRA_LISTEN_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_RPC_ADDRESS=0.0.0.0 \
            -e CASSANDRA_BROADCAST_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_BROADCAST_RPC_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_DC=dc1 \
            -e CASSANDRA_RACK=rack1 \
            -e CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch \
            -e HEAP_NEWSIZE=128M \
            -e MAX_HEAP_SIZE=512M \
            -v cassandra-data:/var/lib/cassandra \
            cassandra:5.0

          # Wait up to 30 min for all 3 nodes to reach UN, then load schema.
          # Nodes 2 and 3 join asynchronously via user-data on their instances.
          for i in $(seq 1 60); do
            sleep 30
            up=$(docker exec cassandra nodetool status 2>/dev/null \
              | awk '/^UN/ {c++} END {print c+0}') || up=0
            echo "[init] nodes UN: $up/3 (attempt $i/60)"
            [ "$up" = "3" ] && break
          done

          if [ "${up:-0}" = "3" ]; then
            cat > /tmp/init.cql <<'CQLEOF'
          CREATE KEYSPACE IF NOT EXISTS sandbox
            WITH replication = {
              'class': 'NetworkTopologyStrategy',
              'dc1': 3
            };

          USE sandbox;

          CREATE TABLE IF NOT EXISTS sensor_readings (
            sensor_id   text,
            reading_ts  timestamp,
            temperature double,
            humidity    double,
            PRIMARY KEY (sensor_id, reading_ts)
          ) WITH CLUSTERING ORDER BY (reading_ts DESC);

          INSERT INTO sensor_readings (sensor_id, reading_ts, temperature, humidity)
            VALUES ('sensor-a', '2026-05-01 09:00:00', 21.4, 47.2);
          INSERT INTO sensor_readings (sensor_id, reading_ts, temperature, humidity)
            VALUES ('sensor-a', '2026-05-01 09:05:00', 21.6, 47.0);
          INSERT INTO sensor_readings (sensor_id, reading_ts, temperature, humidity)
            VALUES ('sensor-a', '2026-05-01 09:10:00', 21.9, 46.8);
          INSERT INTO sensor_readings (sensor_id, reading_ts, temperature, humidity)
            VALUES ('sensor-b', '2026-05-01 09:00:00', 19.1, 52.0);
          INSERT INTO sensor_readings (sensor_id, reading_ts, temperature, humidity)
            VALUES ('sensor-c', '2026-05-01 09:00:00', 23.7, 41.5);
          CQLEOF
            docker exec cassandra cqlsh -f /tmp/init.cql \
              && echo "[init] schema loaded OK" \
              || echo "[init] schema load failed (check /var/log/cloud-init-output.log)"
          else
            echo "[init] WARNING: only $up/3 nodes reached UN — schema not loaded"
          fi

  # ---------------------------------------------------------------------------
  # Node 2 — joins via node 1 as seed.
  # Waits for node 1's gossip port (7000) before starting Cassandra so it
  # doesn't spend retries against an unavailable seed.
  # ---------------------------------------------------------------------------
  CassandraNode2:
    Type: AWS::EC2::Instance
    DependsOn: CassandraNode1
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: !Ref LatestAl2023Ami
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref CassandraSG
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - { Key: Name, Value: cassandra-node-2 }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y docker
          systemctl enable --now docker

          PRIVATE_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)
          SEED_IP="${CassandraNode1.PrivateIp}"

          echo "[node2] waiting for seed $SEED_IP:7000 to be reachable..."
          for i in $(seq 1 40); do
            timeout 3 bash -c "> /dev/tcp/$SEED_IP/7000" 2>/dev/null && break || true
            sleep 15
          done

          docker run -d \
            --name cassandra \
            --restart unless-stopped \
            -p 9042:9042 -p 7000:7000 -p 7001:7001 \
            -e CASSANDRA_CLUSTER_NAME=SandboxCluster \
            -e CASSANDRA_SEEDS="$SEED_IP" \
            -e CASSANDRA_LISTEN_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_RPC_ADDRESS=0.0.0.0 \
            -e CASSANDRA_BROADCAST_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_BROADCAST_RPC_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_DC=dc1 \
            -e CASSANDRA_RACK=rack1 \
            -e CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch \
            -e HEAP_NEWSIZE=128M \
            -e MAX_HEAP_SIZE=512M \
            -v cassandra-data:/var/lib/cassandra \
            cassandra:5.0

  # ---------------------------------------------------------------------------
  # Node 3 — joins via node 1 as seed.
  # Waits for node 1 AND adds an extra delay so node 2 has time to finish
  # bootstrapping before node 3 starts streaming. Cassandra only safely handles
  # one bootstrapping node at a time.
  # ---------------------------------------------------------------------------
  CassandraNode3:
    Type: AWS::EC2::Instance
    DependsOn: CassandraNode2
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: !Ref LatestAl2023Ami
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref CassandraSG
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - { Key: Name, Value: cassandra-node-3 }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y docker
          systemctl enable --now docker

          PRIVATE_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)
          SEED_IP="${CassandraNode1.PrivateIp}"

          echo "[node3] waiting for seed $SEED_IP:7000..."
          for i in $(seq 1 40); do
            timeout 3 bash -c "> /dev/tcp/$SEED_IP/7000" 2>/dev/null && break || true
            sleep 15
          done

          # Extra wait: give node 2 time to finish bootstrapping (streaming data).
          # Cassandra raises "bootstrap is still in progress" if two nodes try to
          # bootstrap simultaneously. Two minutes is conservative but safe.
          echo "[node3] seed reachable; pausing 120s for node 2 to finish bootstrapping..."
          sleep 120

          docker run -d \
            --name cassandra \
            --restart unless-stopped \
            -p 9042:9042 -p 7000:7000 -p 7001:7001 \
            -e CASSANDRA_CLUSTER_NAME=SandboxCluster \
            -e CASSANDRA_SEEDS="$SEED_IP" \
            -e CASSANDRA_LISTEN_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_RPC_ADDRESS=0.0.0.0 \
            -e CASSANDRA_BROADCAST_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_BROADCAST_RPC_ADDRESS="$PRIVATE_IP" \
            -e CASSANDRA_DC=dc1 \
            -e CASSANDRA_RACK=rack1 \
            -e CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch \
            -e HEAP_NEWSIZE=128M \
            -e MAX_HEAP_SIZE=512M \
            -v cassandra-data:/var/lib/cassandra \
            cassandra:5.0

Outputs:
  Node1PublicIp:
    Description: Node 1 (seed) — public IP
    Value: !GetAtt CassandraNode1.PublicIp

  Node2PublicIp:
    Description: Node 2 — public IP
    Value: !GetAtt CassandraNode2.PublicIp

  Node3PublicIp:
    Description: Node 3 — public IP
    Value: !GetAtt CassandraNode3.PublicIp

  CqlEndpoint:
    Description: CQL endpoint — connect to any node (all 3 expose port 9042)
    Value: !Sub "${CassandraNode1.PublicIp}:9042"

  SshNode1:
    Description: SSH to node 1
    Value: !Sub "ssh -i <your-key>.pem ec2-user@${CassandraNode1.PublicIp}"

  SshNode2:
    Description: SSH to node 2
    Value: !Sub "ssh -i <your-key>.pem ec2-user@${CassandraNode2.PublicIp}"

  SshNode3:
    Description: SSH to node 3
    Value: !Sub "ssh -i <your-key>.pem ec2-user@${CassandraNode3.PublicIp}"

  RingStatusCommand:
    Description: Check ring from node 1 once all nodes are up
    Value: !Sub "ssh ec2-user@${CassandraNode1.PublicIp} 'docker exec cassandra nodetool status'"
