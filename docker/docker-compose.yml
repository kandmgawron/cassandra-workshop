# 3-node Cassandra sandbox cluster.
# - cassandra is the seed; cassandra-2 and cassandra-3 join via gossip.
# - All nodes share one logical datacenter (dc1) and one rack (rack1),
#   which lets us use NetworkTopologyStrategy with RF=3 in the demo schema.
# - Heap is intentionally small (512M) so three nodes fit comfortably on a
#   laptop. Production tuning is very different.
# - Only the seed node's CQL port (9042) is published to the host so that
#   `cqlsh` from your laptop talks to one node; the cluster handles the rest.

services:
  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=SandboxCluster
      - CASSANDRA_SEEDS=cassandra
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' | wc -l | grep -q 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - cassandra-net

  cassandra-2:
    image: cassandra:5.0
    container_name: cassandra-2
    hostname: cassandra-2
    environment:
      - CASSANDRA_CLUSTER_NAME=SandboxCluster
      - CASSANDRA_SEEDS=cassandra
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra-2-data:/var/lib/cassandra
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - cassandra-net

  cassandra-3:
    image: cassandra:5.0
    container_name: cassandra-3
    hostname: cassandra-3
    environment:
      - CASSANDRA_CLUSTER_NAME=SandboxCluster
      - CASSANDRA_SEEDS=cassandra
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra-3-data:/var/lib/cassandra
    depends_on:
      cassandra-2:
        condition: service_started
    networks:
      - cassandra-net

volumes:
  cassandra-data:
  cassandra-2-data:
  cassandra-3-data:

networks:
  cassandra-net:
    driver: bridge
